--- # nats
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: sas
spec:
  selector:
    matchLabels:
      app: nats
  serviceName: nats
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container:  nats
      labels:
        app: nats
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: nats
        image: nats:latest
        args:
          - "-js"
          - "-sd"
          - "/data/nats"
        volumeMounts:
        - name: nats-data
          mountPath: /data/nats
  volumeClaimTemplates:
  - metadata:
      name: nats-data 
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: "local-path"
      resources:
        requests:
          storage: 1Gi
--- # nats service
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: sas
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - port: 4222
      name: client
--- # nats external service
apiVersion: v1
kind: Service
metadata:
  name: nats-external
  namespace: sas
spec:
  type: NodePort
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      nodePort: 30222
      name: client
--- # api_gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sas-api-gateway
  namespace: sas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sas-api_gateway
  template:
    metadata:
      labels:
        app: sas-api_gateway
    spec:
      containers:
        - name: api-gateway
          image: registry.msvacina.cz/sas-api_gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: RUST_LOG
              value: "info"
            - name: SAS_PORT
              value: "8080"
            - name: NATS_URL
              value: "nats-0.nats:4222"
            - name: REQUESTS_MAX_MESSAGES
              value: "1000"

---
apiVersion: v1
kind: Service
metadata:
  name: sas-api-service
  namespace: sas
spec:
  type: LoadBalancer
  selector:
    app: sas-api_gateway
  ports:
    - port: 8080
      targetPort: 8080

