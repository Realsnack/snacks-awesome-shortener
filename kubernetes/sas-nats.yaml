--- # nats
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: sas
spec:
  selector:
    matchLabels:
      app: nats
  serviceName: nats
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: nats
      labels:
        app: nats
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: nats
          image: nats:latest
          args:
            - "-js"
            - "-sd"
            - "/data/nats"
          volumeMounts:
            - name: nats-data
              mountPath: /data/nats
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "local-path"
        resources:
          requests:
            storage: 1Gi
--- # nats service
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: sas
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - port: 4222
      name: client
--- # nats external service
apiVersion: v1
kind: Service
metadata:
  name: nats-external
  namespace: sas
spec:
  type: NodePort
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      nodePort: 30222
      name: client
