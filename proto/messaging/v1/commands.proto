syntax = "proto3";

package messaging.v1.commands;

import "common/v1/shorts.proto";

message CreateShortCommand {
  int64  request_time = 1;
  string long_url     = 2;
  int64  expiration   = 3;
}

message PersistShortCommand {
  common.v1.ShortUrl short   = 1;
  int64              created = 2;
}

message RetrieveShortCommand {
  int64  request_time = 1;
  string short_url    = 2;
}